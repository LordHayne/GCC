          source: "protondb.com/app/3472040 (retrieved 2026-07-15)"


  - name: "The Sims 4"
    steam_id: 1222670
    aliases: ["sims 4", "the sims 4"]
    issues:
      - symptom: "EA App shows a black/blank screen inside Steam and The Sims 4 never launches under Proton"
        cause: "The EA App's embedded browser (CEF) fails to render under default Proton's Direct3D path, so the launcher hangs before starting the game."
        fix:
          type: launch_option
          value: "PROTON_USE_WINED3D=1 %command%"
          verified: false
          source: "protondb.com/app/1222670 (retrieved 2026-07-15)"

      - symptom: "Game feels choppy / FPS is capped after using the EA App launch workaround"
        cause: "PROTON_USE_WINED3D forces the slower OpenGL WineD3D renderer instead of DXVK; it is only needed to get the EA App to render, not to play."
        fix:
          type: info
          value: "Once the game launches, remove PROTON_USE_WINED3D=1 so DXVK is used again for smooth performance; a recent Proton (Experimental or latest GE-Proton) often launches the EA App without the workaround at all."
