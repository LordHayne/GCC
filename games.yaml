        when: { gpu: nvidia }
        fix:
          type: launch_option
          value: "STEAMDECK=1 gamemoderun %command%"
          verified: false
          source: "protondb.com/app/3513350 (retrieved 2026-07-15)"


  - name: "NBA 2K26"
