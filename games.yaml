  - name: "Path of Exile 2"
    steam_id: 2694490
    aliases: ["poe2", "path of exile 2"]
    issues:
      - symptom: "Game launches to a black/blank screen or crashes on startup under Proton (Vulkan renderer)"
        cause: "PoE2's native Vulkan renderer does not initialize correctly under Proton; the DirectX 12 renderer (via VKD3D-Proton) is the reliable path. GGG themselves recommend switching off Vulkan to fix launch crashes."
        fix:
          type: info
          value: "Switch the renderer to DirectX 12: in-game Options -> Graphics, or edit poe2_production_Config.ini in the Proton prefix (.../compatdata/2694490/pfx/.../Documents/My Games/Path of Exile 2/) and set renderer_type=DirectX12 (replacing renderer_type=Vulkan)."
          verified: false
          source: "x.com/pathofexile/status/1908227562733797720 (retrieved 2026-07-15)"

      - symptom: "Frame-time spikes / shader-compilation stutter when new skills, monsters or areas load"
        cause: "The GPU shader disk cache is cleared between sessions, forcing repeated shader recompilation on NVIDIA drivers."
        when: { gpu: nvidia }
        fix:
          type: launch_option
          value: "__GL_SHADER_DISK_CACHE_SKIP_CLEANUP=1 %command%"
          verified: false
          source: "protondb.com/app/2694490 (retrieved 2026-07-15)"


  - name: "Sid Meier's Civilization VI"
    steam_id: 289070
    aliases: ["civ 6", "civilization vi", "civ6"]
    issues:
      - symptom: "Native Linux build (Aspyr) fails to launch, crashes on startup, or hangs on a black screen on modern distros/CachyOS"
        cause: "Aspyr effectively abandoned the native port after a buggy 2022 update rollback; the aging native binary is unstable on current Mesa/glibc/Wayland stacks. The Windows build under Proton is Gold/Platinum and far more reliable."
        fix:
          type: info
          value: "Properties -> Compatibility -> Force a specific Steam Play compatibility tool -> pick Proton (Experimental or latest stable). The Windows build runs well via Proton and sidesteps the broken native launcher."
          verified: false
          source: "protondb.com/app/289070 (retrieved 2026-07-15)"

      - symptom: "Prefer to stay on the native build but it black-screens or crashes immediately at launch"
        cause: "The native build's bug-collection/telemetry routine crashes on startup on many modern systems before the game window appears."
        fix:
          type: info
          value: "Edit ~/.local/share/aspyr-media/Sid Meier's Civilization VI/AppOptions.txt and set EnableBugCollection from 1 to 0. This lets the native build reach the main menu on systems where it otherwise dies at launch."
          verified: false
          source: "support.aspyr.com/hc/en-us/articles/360020133272 (retrieved 2026-07-15)"

      - symptom: "Late-game turn times (AI turn processing) get very slow on large maps"
        cause: "End-of-turn AI processing is single-thread CPU-bound in the game engine, not a GPU or driver issue; no launch flag speeds it up."
        fix:
          type: info
          value: "No launch option fixes this - it is engine-side single-threaded CPU load. Mitigate with a smaller map / fewer AI civs and a performance CPU governor. On a 2-CCD 3900X, single-core boost matters more than core count."
          verified: false
          source: "protondb.com/app/289070 (retrieved 2026-07-15)"


  - name: "Total War: WARHAMMER III"
    steam_id: 1142710
    aliases: ["warhammer 3", "total war warhammer 3", "tww3"]
    issues:
      - symptom: "Unsure whether to use the native Feral build or Proton"
        cause: "Steam ID 1142710 ships an official native Linux build ported by Feral Interactive (Vulkan renderer), with no anti-cheat. It launches out of the box with the default Steam runtime."
        fix:
          type: info
          value: "Native Vulkan port by Feral, no anti-cheat - installs and launches directly. ProtonDB rates it Gold (that reflects the Windows-via-Proton path); the native Feral build is the default and simplest way to start."
          verified: false
          source: "protondb.com/app/1142710 (retrieved 2026-07-15)"

      - symptom: "Freeze / crash at main menu or campaign benchmark after loading"
        cause: "With shadows set to 'High' on recent NVIDIA drivers (above 570), the game locks up or crashes at the main menu / benchmark. Reported on both the Feral native build and Windows via Proton."
        when: { gpu: nvidia }
        fix:
          type: info
          value: "Lower Shadow Quality below 'High' in the in-game graphics options; if it persists, roll back the NVIDIA driver to the 570 series."
          verified: false
          source: "community.creative-assembly.com/total-war/total-war-warhammer/bugs/10051 (retrieved 2026-07-15)"

      - symptom: "Can't play multiplayer with Windows friends on the native build"
        cause: "The Feral native Linux port uses a different math library than the Windows build, so online play is restricted to same-OS (Linux/Mac) players and mod/update cadence lags Windows."
        fix:
          type: info
          value: "For cross-OS multiplayer or full mod support, run the Windows build under Proton instead of the native port (Properties -> Compatibility -> Force Proton). Use native for single-player; use Proton to match Windows friends."
          verified: false
          source: "gamingonlinux.com/2022/06/total-war-warhammer-iii-feral-linux-port (retrieved 2026-07-15)"


  - name: "RimWorld"
    steam_id: 294100
    aliases: ["rimworld"]
    issues:
      - symptom: "Game won't launch or you're unsure whether to use Proton"
        cause: "RimWorld ships a native Unity Linux build with no anti-cheat; it launches directly under Steam without Proton and is ProtonDB Platinum/strong. Forcing Proton is unnecessary and can add overhead."
