          value: "Properties -> Compatibility -> check 'Force a specific Steam Play compatibility tool' and select a modern Proton (Experimental or Proton 9+). No launch options needed after that; the game runs out of the box. No anti-cheat."
          verified: false
          source: "protondb.com/app/632360 (retrieved 2026-07-15)"

      - symptom: "Frame rate degrades badly in long runs as on-screen item/enemy/projectile density climbs"
        cause: "This is Unity CPU-bound simulation load from item/entity density, not a Proton/GPU translation problem, so no launch option meaningfully removes it."
        fix:
          type: info
          value: "Treat as an engine limitation, not a Proton bug. There is no reliable launch_option fix; keep to a current Proton build and reduce late-run stacking of highly-active items."
          verified: false
          source: "protondb.com/app/632360 (retrieved 2026-07-15)"


