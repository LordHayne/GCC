  - name: "THE FINALS"
    steam_id: 2073850
    aliases: ["the finals", "finals"]
    issues:
      - symptom: "Game fails to launch / EAC error - anti-cheat does not initialize under Proton"
        cause: "The Finals uses Easy Anti-Cheat; it needs the Proton EAC runtime and the Linux EAC path enabled. Without it the game closes immediately at the splash/EAC handshake."
        fix:
          type: launch_option
          value: "PROTON_USE_EAC_LINUX=1 %command%"
          verified: false
          source: "github.com/pollux78/the-finals-linux-troubleshoot-guide (retrieved 2026-07-15)"

      - symptom: "Crash on startup on some distros (game quits within seconds of launch)"
        cause: "Unreal Engine 5 needs a high vm.max_map_count; distros that ship a low default (65530) crash the game. CachyOS already ships a high default, so this rarely affects this machine. The fix lives in /etc, so apply it manually."
        fix:
          type: info
          value: "If the game crashes instantly, check 'sysctl vm.max_map_count'; UE5 wants it very high. CachyOS sets this by default. To change persistently, add vm.max_map_count=2147483642 to /etc/sysctl.d/ and reboot."
          verified: false
          source: "github.com/pollux78/the-finals-linux-troubleshoot-guide (retrieved 2026-07-15)"

      - symptom: "Heavy stutter after shader compilation on NVIDIA GPUs"
        cause: "UE5 shader/traversal stutter that persists on some NVIDIA setups. Hiding the NVIDIA GPU identity forces a code path that removes the stutter, but disables DLSS and Reflex low-latency. Primarily reported on RTX 40/50; try only if stutter is severe."
        when: { gpu: nvidia }
        fix:
          type: launch_option
          value: "PROTON_HIDE_NVIDIA_GPU=1 %command%"
          verified: false
          source: "github.com/pollux78/the-finals-linux-troubleshoot-guide (retrieved 2026-07-15)"


