          source: "areweanticheatyet.com/game/destiny-2 (retrieved 2026-07-15)"


  - name: "New World: Aeternum"
    steam_id: 1063730
    aliases: ["new world", "new world aeternum"]
    issues:
      - symptom: "Game does not launch, or exits at the Easy Anti-Cheat splash / login on older Proton versions"
