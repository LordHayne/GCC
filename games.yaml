        fix:
          type: info
          value: "Force Proton Experimental (or a recent Proton-GE) in Compatibility. The base game and offline modes (Fighting Ground, World Tour) then run well; ordinary online (Battle Hub, Ranked, Casual) also works. Only the separate ESL Wire tournament client is blocked on Linux."
          verified: false
          source: "github.com/ValveSoftware/Proton/issues/6817 (retrieved 2026-07-15)"

      - symptom: "Want extra frametime/CPU headroom for a stable 60fps in matches"
        cause: "Default launch does not enable the system's game performance governor."
        fix:
          type: launch_option
          value: "gamemoderun %command%"
          verified: false
          source: "protondb.com/app/1364780 (retrieved 2026-07-15)"


  - name: "DayZ"
