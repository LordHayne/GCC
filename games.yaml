  - name: "Crimson Desert"
    steam_id: 3321460
    aliases: ["crimson desert"]
    issues:
      - symptom: "Game hangs on the loading screen (audio continues, video freezes) even though it launches and reaches menus"
        cause: "Regression with recent NVIDIA beta drivers (reported on the 595 beta line); dmesg shows a GPU context-switch timeout. Driver-side, not Proton."
        when: { gpu: nvidia }
        fix:
          type: info
          value: "Use the current stable NVIDIA driver (reporters fell back from the 595 beta to the 590 stable branch to get past the loading screen). No launch flag or Proton version fixes this. If you run ray tracing, try disabling RT in-game, which cleared the same freeze for some users and roughly restored FPS."
