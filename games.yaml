        fix:
          type: info
          value: "Install GE-Proton 10.8 or newer (e.g. via ProtonUp-Qt) and select it in the game's Compatibility settings; it applies the Steam Deck spoof automatically, so no launch option is needed."
          verified: false
          source: "gamingonlinux.com/2025/04/wuthering-waves-arrives-on-steam-with-anti-cheat-problems-on-linux (retrieved 2026-07-15)"

