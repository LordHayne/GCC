          verified: false
          source: "forum.paradoxplaza.com/forum/threads/1565508 (retrieved 2026-07-15)"


  - name: "BeamNG.drive"
    steam_id: 284160
    aliases: ["beamng", "beamng.drive"]
    issues:
      - symptom: "Game fails to launch or crashes at startup when forced onto GE-Proton or an older Proton build"
        cause: "BeamNG's Steamworks SDK version only works with specific Proton builds; the January 2026 update made the native Linux (Vulkan) binary the default, and only Proton 10.0-4 / Proton Experimental are compatible. No anti-cheat is involved."
        fix:
          type: info
          value: "Let Steam use the default native Linux runtime, or if forcing Proton set the compatibility tool to Proton Experimental (or Proton 10.0-4). Avoid GE-Proton / older Proton."
          verified: false
          source: "documentation.beamng.com/support/troubleshooting/steamdeck_linux (retrieved 2026-07-15)"

      - symptom: "Game closes/crashes mid-session on systems with 16 GB RAM or less"
        cause: "BeamNG can consume more than 16 GB of memory; with no headroom the OS OOM-kills the process."
        fix:
          type: info
          value: "Enable zram plus disk swap so the physics engine has memory headroom (CachyOS ships zram by default; confirm it is active)."
          verified: false
          source: "documentation.beamng.com/support/troubleshooting/steamdeck_linux (retrieved 2026-07-15)"

      - symptom: "Low/stuttering FPS in this CPU/physics-heavy sim, especially with multiple vehicles"
        cause: "Soft-body physics is CPU-bound; the Proton path loses performance versus native, and high Physics Detail multiplies CPU load."
        fix:
          type: info
          value: "Run the native Linux (Vulkan) binary rather than Proton, and lower the in-game Physics Detail setting when spawning multiple vehicles. On NVIDIA, ensure the proprietary driver is installed for Vulkan 1.3 support."
          verified: false
          source: "dedoimedo.com/games/steam-proton-beamng.html (retrieved 2026-07-15)"


  - name: "Garry's Mod"
    steam_id: 4000
    aliases: ["gmod", "garrys mod"]
    issues:
      - symptom: "Game crashes on launch after 'Initializing Serverside' (or CEF/menu shows black), most often on the 'Chromium + 64-bit Binaries' (x86-64) beta branch"
        cause: "The x86-64 Chromium build ships without proprietary media codecs and Steam's integrity check strips/reverts the CEF patch, so the native Linux client dies during startup."
        fix:
          type: info
          value: "In Steam -> Properties -> Betas select the 'x86-64' branch, then download and run GModPatchTool (formerly GModCEFCodecFix) once to re-patch CEF; re-run it after any game update. Do NOT put '-nochromium' in launch options."
          verified: false
          source: "solsticegamestudios.com/fixmedia/linux (retrieved 2026-07-15)"

      - symptom: "Native Linux client fails to start / instantly crashes with no window on some modern kernels"
        cause: "GMod's Chromium sandbox needs unprivileged user namespaces; distros that disable them block the CEF child process from spawning."
        fix:
          type: info
          value: "Enable unprivileged user namespaces (e.g. sysctl kernel.unprivileged_userns_clone=1, made persistent via a sysctl.d drop-in). CachyOS enables this by default."
          verified: false
          source: "civilnetworks.net/community/threads/fixing-crashes-gmod-chromium.22032 (retrieved 2026-07-15)"

      - symptom: "Low/stuttery FPS in CPU-heavy scenes; long startup with intro logos"
        cause: "Source defaults to single-threaded material queue; multicore rendering is off by default and startup plays the valve/facepunch videos."
        fix:
          type: launch_option
          value: "%command% -novid +gmod_mcore_test 1 +mat_queue_mode 2"
          verified: false
          source: "steamcommunity.com/sharedfiles/filedetails/?id=2033799294 (retrieved 2026-07-15)"


  - name: "Don't Starve Together"
    steam_id: 322330
    aliases: ["dst", "dont starve together"]
    issues:
      - symptom: "Game crashes to a black screen immediately on the native Linux build, sometimes with 'libcurl-gnutls.so.4: cannot open shared object file'"
        cause: "The native binary is 32-bit and needs the 32-bit libcurl (gnutls) library, which is not always pulled in by default."
        fix:
          type: info
          value: "Install the 32-bit libcurl-gnutls package (Arch/CachyOS: lib32-libcurl-gnutls; Debian/Ubuntu: libcurl3-gnutls:i386). Verify game file integrity and use the native Linux build. No anti-cheat is present."
          verified: false
          source: "steamcommunity.com/app/322330/discussions/0/485624149162956663 (retrieved 2026-07-15)"


