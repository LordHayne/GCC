  - name: "Project Zomboid"
    steam_id: 108600
    aliases: ["project zomboid", "zomboid", "pz"]
    issues:
      - symptom: "Game does not launch on Arch-based distros (e.g. CachyOS): black screen for a moment then exits, or a console error like 'libstdc++.so.6: version GLIBCXX_3.4.xx not found'"
        cause: "Project Zomboid ships its own JRE and bundles old copies of libstdc++.so.6 and related libs. On a rolling/up-to-date system the bundled libstdc++ is older than the game is built against, so the native launch fails."
        fix:
          type: info
          value: "In the game install dir (default ~/.local/share/Steam/steamapps/common/ProjectZomboid), delete or rename the bundled libstdc++.so.6 so the game uses the system library. Same applies to other outdated bundled libs (libdrm.so.2, libGLdispatch.so.0). Native build, no anti-cheat."
          verified: false
          source: "wiki.archlinux.org/title/Steam/Game-specific_troubleshooting (retrieved 2026-07-15)"

      - symptom: "Runs but stutters: very long loads, chunk-load spikes, or 'OutOfMemoryError: Java heap space' in the log"
        cause: "The Java heap default (-Xmx) is too small; the JVM garbage-collects and re-streams chunks under load. Client heap is read from a JSON, not from Steam launch options."
        fix:
          type: info
          value: "Edit ProjectZomboid64.json in the game install dir and raise the -Xmx line (e.g. -Xmx8192m vanilla, -Xmx12288m for heavy mods). Keep -Xmx under ~75% of system RAM."
          verified: false
          source: "steamcommunity.com/app/108600/discussions/0/598518433314769733 (retrieved 2026-07-15)"


  - name: "Slay the Spire"
    steam_id: 646570
    aliases: ["slay the spire", "sts"]
    issues:
      - symptom: "Native Linux build fails to launch (nothing happens on Play, or crashes immediately), often after a Steam client/runtime update"
        cause: "The bundled Java/LibGDX native runtime occasionally breaks against the current Steam Linux Runtime; the game itself has no anti-cheat and runs fine under Proton."
        fix:
          type: info
          value: "Properties -> Compatibility -> 'Force a specific Steam Play compatibility tool' -> pick the latest Proton (e.g. Proton Experimental). This runs the Windows build, which launches reliably when the native build is broken."
          verified: false
          source: "steamcommunity.com/app/646570/discussions/1/4626979420667730529 (retrieved 2026-07-15)"


  - name: "Brawlhalla"
    steam_id: 291550
    aliases: ["brawlhalla"]
    issues:
      - symptom: "Brawlhalla won't launch, or you're worried its anti-cheat will block it"
        cause: "Brawlhalla is a Windows Steam build run through Proton. It uses Easy Anti-Cheat, but the developer shipped Proton EAC support in 2021, so EAC loads in the userspace runtime - there is no kernel-level anti-cheat. The Steam build also does not force a Ubisoft Connect login."
        fix:
          type: info
          value: "Works out of the box via Proton (ProtonDB Gold). No kernel anti-cheat: EAC runs in Proton's userspace runtime and the Steam build needs no Ubisoft Connect login. Use Proton 9+ or Experimental if you hit any launch hiccups."
          verified: false
          source: "protondb.com/app/291550 (retrieved 2026-07-15)"

      - symptom: "Brawlhalla feels capped or has extra input lag"
        cause: "By default the game targets 60 fps; uncapping the frame rate lowers input latency, done via a native game launch argument passed through Proton."
        fix:
          type: launch_option
          value: "%command% -unlockfps"
          verified: false
          source: "brawlhalla.wiki.gg/wiki/Launch_options (retrieved 2026-07-15)"


  - name: "Assetto Corsa"
    steam_id: 244210
    aliases: ["assetto corsa"]
    issues:
      - symptom: "The in-game launcher crashes or shows a black screen and never reaches the main menu on the default Proton runtime"
