  - name: "Crusader Kings III"
    steam_id: 1158310
    aliases: ["ck3", "crusader kings 3"]
    issues:
      - symptom: "Game does not launch / hangs on the Paradox launcher after a Steam or expansion update (native Linux)"
        cause: "CK3 ships a native Linux build with no anti-cheat, but Steam sometimes overwrites the launcher folder with the Windows launcher files, leaving the native launcher unable to start."
        fix:
          type: info
          value: "In Properties -> Compatibility, force a Proton version, close Properties, then switch back to native Linux. This makes Steam re-pull the correct Linux launcher files. If it still hangs, verify integrity of game files."
          verified: false
          source: "forum.paradoxplaza.com/forum/threads/ck-iii-paradox-launcher-is-borked.1448751 (retrieved 2026-07-15)"

      - symptom: "Severe FPS drop / stutter when zoomed in on the map or in late game on the native Vulkan renderer"
        cause: "The native Linux build uses Vulkan; patch 1.18 introduced a large zoomed-in performance regression. Paradox restored most of it in 1.18.2 (Dec 2025), but Vulkan can still be choppy for some."
        fix:
          type: info
          value: "First update to 1.18.2 or later, which restores most Vulkan performance. If still choppy, run the game via Proton and choose the DX11 renderer in the launcher, which several users report is smoother than native Vulkan."
          verified: false
          source: "gamingonlinux.com/2025/12/paradox-fixed-vulkan-performance-crusader-kings-iii (retrieved 2026-07-15)"


  - name: "Mount & Blade II: Bannerlord"
    steam_id: 261550
    aliases: ["bannerlord", "mount and blade 2"]
    issues:
      - symptom: "Game hangs on the TaleWorlds launcher, shows a black screen, or has dead/broken mouse input on launch under Proton"
        cause: "Bannerlord's own launcher and its experimental Vulkan backend are unreliable under Proton; the default DirectX 11 (DXVK) render path is the stable one, and older Proton builds mishandle launcher input."
        fix:
          type: info
          value: "Use a current Proton (Experimental or a recent GE-Proton) and leave the launcher's renderer on DirectX 11 (default DXVK). Do NOT switch the launcher to the native Vulkan backend on Proton - it commonly crashes on launch. No client-side anti-cheat in single-player."
          verified: false
          source: "protondb.com/app/261550 (retrieved 2026-07-15)"

      - symptom: "Large battles stutter, drop FPS hard, or freeze at high troop counts; game is CPU-bound"
        cause: "Bannerlord simulates every unit on the CPU, so battle size is the dominant performance lever; the always-on launcher also adds measurable overhead on Proton."
        fix:
          type: info
          value: "Lower 'Battle Size' in Options -> Performance (the biggest CPU lever). Skipping the Bannerlord launcher also reduces overhead but requires a manual file symlink, so it is not offered as a launch option here."
          verified: false
          source: "steamcommunity.com/app/261550/discussions/0/2144217924392222478 (retrieved 2026-07-15)"


  - name: "Balatro"
    steam_id: 2379780
    aliases: ["balatro"]
    issues:
      - symptom: "Runs out of the box on Proton with no configuration (tiny LOVE/Lua 2D card game, no anti-cheat)"
        cause: "Balatro is extremely lightweight and fully compatible with Proton - ProtonDB rates it Platinum (strong confidence, 487 reports). No launch options are needed to start or run smoothly."
        fix:
          type: info
          value: "Just install and play. No launch options required. Verified Platinum on ProtonDB; no anti-cheat. Runs at capped frame rate with negligible load out of the box."
          verified: false
          source: "protondb.com/app/2379780 (retrieved 2026-07-15)"


  - name: "Ready or Not"
    steam_id: 1144200
    aliases: ["ready or not", "ron"]
    issues:
      - symptom: "Black screen or crash on startup under Proton; game hangs before reaching the menu"
        cause: "Ready or Not (UE4/5) can pick the DX12 renderer, which is less stable than DX11 under Proton on some setups; forcing DX11 is the most-reported startup fix. No blocking anti-cheat; P2P co-op works."
        fix:
          type: launch_option
          value: "%command% -dx11"
          verified: false
          source: "gameleap.com/articles/ready-or-not-crashing-on-startup (retrieved 2026-07-15)"

      - symptom: "Recurring shader-compilation stutter/hitching during play (Unreal Engine)"
        cause: "UE compiles pipeline shaders on-the-fly; the NVIDIA driver's on-disk shader cache is small and gets auto-purged, so shaders keep recompiling every session."
        when: { gpu: nvidia }
        fix:
          type: launch_option
          value: "__GL_SHADER_DISK_CACHE=1 __GL_SHADER_DISK_CACHE_SKIP_CLEANUP=1 %command%"
          verified: false
          source: "protondb.com/app/1144200 (retrieved 2026-07-15)"


  - name: "FINAL FANTASY XIV Online"
    steam_id: 39210
    aliases: ["ffxiv", "final fantasy xiv", "ff14"]
    issues:
      - symptom: "Game shows as installed but the official Square Enix launcher fails to load, hangs on a blank window, or errors out through Steam Proton"
        cause: "The bundled official launcher uses an embedded .NET/CEF browser that is unreliable under Proton/Wine; the game client itself runs fine, only the launcher wrapper is broken."
        fix:
          type: info
          value: "Use the community launcher XIVLauncher/XLCore instead of the official one. Install the native Linux build via Flatpak: flatpak install flathub dev.goats.xivlauncher, then log in through it - it handles patching and boots straight into the game. FFXIV has no kernel-level anti-cheat (detection is server-side), so this is fully allowed."
          verified: false
          source: "goatcorp.github.io/faq/xl_troubleshooting.html (retrieved 2026-07-15)"

      - symptom: "Launcher connection/patching errors or gets stuck before the title screen, even though the launcher opens"
        cause: "Routing to Square Enix / GitHub CDN from some ISPs is unstable under Proton networking, causing patch and login timeouts."
        fix:
          type: info
          value: "In XIVLauncher, retry patching (a VPN routed to Japan, or Cloudflare WARP, or a DNS switch help) until you reach the title screen. This is a network-route workaround, not a client fix."
          verified: false
          source: "goatcorp.github.io/faq/xl_troubleshooting.html (retrieved 2026-07-15)"

      - symptom: "Game runs but feels choppy or has noticeable input lag in DX11 mode"
        cause: "Default DXVK frame latency and lack of CPU scheduling optimization leave performance on the table for this DX11 MMO."
        fix:
          type: launch_option
          value: "gamemoderun %command%"
          verified: false
          source: "protondb.com/app/39210 (retrieved 2026-07-15)"


