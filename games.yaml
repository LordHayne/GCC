          value: "Properties -> Compatibility -> 'Force a specific Steam Play compatibility tool' -> Proton Experimental (or latest stable). Starts and plays without further tweaks. Steam P2P co-op works."
          verified: false
          source: "protondb.com/app/648800 (retrieved 2026-07-15)"

      - symptom: "Frame stutter / hitching and CPU spikes during play, typical of this Unity engine title"
        cause: "Unity frame-pacing under Proton; a scheduler/priority boost smooths it. GameMode requests CPU governor and I/O priority."
        fix:
          type: launch_option
          value: "gamemoderun %command%"
          verified: false
          source: "protondb.com/app/648800 (retrieved 2026-07-15)"


  - name: "Half-Life 2"
    steam_id: 220
    aliases: ["half-life 2", "hl2"]
    issues:
      - symptom: "Native Linux build fails to launch or crashes on startup after the Nov 2024 20th-anniversary update"
        cause: "The reworked native Source build is occasionally unstable on modern Mesa/NVIDIA setups; forcing a Proton runtime sidesteps the native binary entirely."
        fix:
          type: info
          value: "Properties -> Compatibility -> 'Force a specific Steam Play compatibility tool' -> Proton Experimental. Only needed if the native build misbehaves; otherwise leave it off. Native, no anti-cheat."
          verified: false
          source: "protondb.com/app/220 (retrieved 2026-07-15)"

      - symptom: "Valve/intro logo videos play on every launch, occasionally hanging before the main menu"
        cause: "Source plays bundled intro movies at startup; -novid skips them for a faster, cleaner launch."
        fix:
          type: launch_option
          value: "%command% -novid"
          verified: false
          source: "pcgamingwiki.com/wiki/Half-Life_2 (retrieved 2026-07-15)"


  - name: "Arma 3"
    steam_id: 107410
    aliases: ["arma 3", "arma3"]
    issues:
      - symptom: "Arma 3 hangs or freezes shortly after launching under Proton, especially with a high-polling-rate (1000 Hz) mouse"
        cause: "Proton's default input handling chokes on high mouse-poll rates in the Real Virtuality engine; forcing raw input avoids the freeze. BattlEye is supported on Proton (Bohemia enabled it Nov 2021), so official servers work."
        fix:
          type: launch_option
          value: "PROTON_USE_RAW_INPUT=1 %command%"
          verified: false
          source: "protondb.com/app/107410 (retrieved 2026-07-15)"

      - symptom: "Low/stuttery FPS in Arma 3 on Linux (engine is single-thread CPU-bound)"
        cause: "Arma 3's Real Virtuality 4 engine is heavily CPU-bound on one core; trimming startup work and giving it explicit memory reduces stutter and load time."
        fix:
          type: launch_option
          value: "%command% -noSplash -world=empty -maxMem=8192"
          verified: false
          source: "steamcommunity.com/sharedfiles/filedetails/?id=3393417605 (retrieved 2026-07-15)"


  - name: "Sons of the Forest"
    steam_id: 1326470
    aliases: ["sons of the forest", "sotf"]
    issues:
      - symptom: "Sons of the Forest launches but runs choppy / low FPS on NVIDIA; DLSS is missing in the graphics menu"
        cause: "Under Proton the NVIDIA NVAPI layer (which exposes DLSS) is not always enabled, so the game's built-in DLSS upscaler stays unavailable."
        when: { gpu: nvidia }
        fix:
          type: launch_option
          value: "PROTON_ENABLE_NVAPI=1 %command%"
          verified: false
          source: "protondb.com/app/1326470 (retrieved 2026-07-15)"

      - symptom: "Frametime stutter / CPU not boosting during play on Proton"
        cause: "CPU governor stays in a power-saving profile; UE traversal stutter is worse without a performance governor. No anti-cheat; P2P co-op works."
        fix:
          type: launch_option
          value: "gamemoderun %command%"
          verified: false
          source: "protondb.com/app/1326470 (retrieved 2026-07-15)"

      - symptom: "Game RAM usage climbs until it crashes / reboots the machine over a long session"
        cause: "Known memory-leak reported under Proton; primarily affects low-RAM systems (e.g. Steam Deck ~14GB)."
        fix:
          type: info
          value: "Use latest Proton Experimental or Proton-GE; the memory leak mainly crashes low-RAM systems, less of an issue on desktops with 16GB+ RAM."
          verified: false
          source: "github.com/ValveSoftware/Proton/issues/6559 (retrieved 2026-07-15)"


  - name: "Cities: Skylines"
    steam_id: 255710
    aliases: ["cities skylines", "cities: skylines"]
    issues:
      - symptom: "Game/launcher fails to start or the Paradox launcher window crashes on a Wayland session (native build)"
        cause: "The bundled Paradox launcher is an Electron app that mishandles native Wayland; it needs to fall back to XWayland."
        when: { session: wayland }
        fix:
          type: launch_option
          value: "ELECTRON_OZONE_PLATFORM_HINT=x11 %command%"
          verified: false
          source: "wiki.archlinux.org/title/Steam/Game-specific_troubleshooting (retrieved 2026-07-15)"

      - symptom: "Native build stutters / low FPS in large, late-game cities even though the GPU is not saturated"
        cause: "The Unity simulation is single-thread CPU-bound at high population; the native Linux binary performs worse here than the Windows build. No native launch flag fixes this."
        fix:
          type: info
          value: "This is inherent CPU-bound simulation, not a config bug. If large-city performance is poor on the native build, force the game through Proton (Properties -> Compatibility) - many players report smoother late-game framerates that way. No anti-cheat; native needs no launch options to run."
          verified: false
          source: "protondb.com/app/255710 (retrieved 2026-07-15)"


  - name: "Sid Meier's Civilization V"
    steam_id: 8930
    aliases: ["civ 5", "civilization v", "civ5"]
    issues:
      - symptom: "Native (Aspyr) Linux build fails to launch, hangs on a black screen after the intro videos, or shows graphical corruption on modern systems"
        cause: "The aging Aspyr OpenGL port is unmaintained and breaks against current Mesa/NVIDIA drivers; forcing the Windows build through Proton is now the more reliable path and generally performs as well or better."
        fix:
          type: info
          value: "Properties -> Compatibility -> 'Force a specific Steam Play compatibility tool' -> pick Proton (Experimental / GE), then launch. This runs the Windows build instead of the native port. No anti-cheat, so Proton is safe. If the native build launches fine for you, no action is needed."
          verified: false
          source: "protondb.com/app/8930 (retrieved 2026-07-15)"

      - symptom: "Turn processing ('Please Wait' between turns) gets progressively slower in the late game on large maps"
        cause: "Civ V's turn/AI/pathfinding logic is CPU-bound and effectively single-threaded, limited by per-core speed and the engine's ~4 GB memory ceiling, not the GPU. Engine-inherent, identical on native and Proton."
        fix:
          type: info
          value: "No launch option meaningfully speeds up turn times; it is bound by single-thread CPU performance. Practical mitigations are gameplay-side: smaller map size and fewer civ/city-state slots. A high single-thread-clock CPU (a 3900X core is plenty) helps more than any GPU tweak."
          verified: false
          source: "steamcommunity.com/app/8930 (retrieved 2026-07-15)"


  - name: "Satisfactory"
    steam_id: 526870
    aliases: ["satisfactory"]
    issues:
      - symptom: "Frame-pacing hitches / shader-compilation stutter when panning across large factories on NVIDIA; DX12 (the default renderer) adds CPU overhead under Proton"
        cause: "Satisfactory defaults to the DX12 RHI, which Proton translates to Vulkan via vkd3d-proton and recompiles pipelines on the fly. The engine also ships a native Vulkan RHI that skips the translation layer and often gives smoother frame times on NVIDIA. No anti-cheat; co-op works."
        when: { gpu: nvidia }
        fix:
          type: launch_option
          value: "%command% -vulkan"
          verified: false
          source: "protondb.com/app/526870 (retrieved 2026-07-15)"

      - symptom: "Brief stutter on the first playthrough / after updates that clears itself; late-game mega-factories become CPU-bound"
        cause: "UE5 builds its pipeline/shader cache during the first minutes of play; once cached, stutter stops. Large-factory simulation is single-thread/CPU-limited by design, so no launch flag removes it."
        fix:
          type: info
          value: "Let the shader cache build on first launch (don't clear the Proton/DXVK cache). For big factories, cap in-game settings and rely on Game Mode's CPU performance profile rather than a launch flag."
          verified: false
          source: "steamcommunity.com/app/526870/discussions/0/4625853880055465823 (retrieved 2026-07-15)"


  - name: "Risk of Rain 2"
    steam_id: 632360
    aliases: ["risk of rain 2", "ror2"]
    issues:
      - symptom: "Game fails to launch, crashes, or online co-op won't connect when Steam runs the old bundled native Linux build"
        cause: "Risk of Rain 2's native Linux build was abandoned at an old game version and is out of sync with the current Windows build; forcing Proton is the standard fix and is how the game runs Platinum."
        fix:
