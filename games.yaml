      - symptom: "Simulation slows down (low TPS) in large late-game colonies"
        cause: "Late-game RimWorld is CPU-bound and largely single-threaded; tick rate drops as pawn/item counts grow. Engine-inherent, not a Linux or GPU problem. GameMode can shave a little via the performance governor."
        fix:
          type: launch_option
          value: "gamemoderun %command%"
          verified: false
