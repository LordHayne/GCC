    issues:
      - symptom: "Game fails to launch on Linux / Steam Deck; ACE anti-cheat error, black screen or instant exit"
        cause: "Wuthering Waves ships Anti-Cheat Expert (ACE), a kernel-level anti-cheat that runs a hardware check and only whitelists official Steam Deck hardware. On generic desktop Linux the check fails and the game refuses to start; spoofing Steam Deck identity satisfies the check."
