  - name: "Resident Evil Requiem"
    steam_id: 3764200
    aliases: ["re requiem", "resident evil requiem"]
    issues:
      - symptom: "Game locks you out for 24 hours after you switch Proton versions a few times"
        cause: "Ships with Denuvo Anti-Tamper DRM; each Proton version counts as a new machine activation, and Denuvo allows only 5 activations per 24 hours - a common Linux/Steam Deck gotcha."
        fix:
          type: info
          value: "Pick one Proton version and stick with it. Do NOT hop between Proton builds to troubleshoot - each swap burns a Denuvo activation (changing launch options or in-game settings does NOT count). If locked out, wait 24h. Prefer Valve's assigned/default Proton for this title."
          verified: false
          source: "gamingonlinux.com/2025/05/denuvo-will-lock-you-out-of-games-on-linux (retrieved 2026-07-15)"

      - symptom: "Freezes/hard-locks roughly 30 seconds after launch on Linux"
        cause: "RE Engine + Proton compatibility on some Proton builds; appears build-dependent."
        fix:
          type: info
          value: "Use stable Proton 10 (or the Steam-assigned default). Users report switching back to regular Proton 10 resolves the early freeze. Change deliberately and once, to avoid tripping the Denuvo activation limit above."
          verified: false
          source: "steamcommunity.com/app/3764200/discussions (retrieved 2026-07-15)"

      - symptom: "Traversal/shader stutter and high VRAM pressure at higher texture settings"
        cause: "RE Engine streams textures aggressively and compiles shaders on the fly; on an 8 GB card the in-game texture-memory bar can push past VRAM and cause hitching."
        when: { gpu: nvidia }
        fix:
          type: info
          value: "Let Steam finish shader pre-caching before first play, and keep in-game Texture Quality within the on-screen VRAM budget bar (8 GB on the 2070 SUPER). No game-specific perf launch option is verified yet - treat as early data."
          verified: false
          source: "protondb.com/app/3764200 (retrieved 2026-07-15)"


  - name: "Black Myth: Wukong"
    steam_id: 2358720
    aliases: ["black myth wukong", "wukong"]
    issues:
      - symptom: "Game fails to launch (black screen / crash on boot) with default/older Proton"
        cause: "UE5 + Denuvo DRM title needs a recent Proton runtime; older stable Proton builds fail to start it. It is single-player with Denuvo anti-tamper DRM only (no anti-cheat), so it runs on Linux once a modern runtime is used."
        fix:
          type: info
          value: "Set the compatibility tool to Proton Experimental or GE-Proton (latest) via Properties -> Compatibility. This is the most common launch blocker and needs no shell/launch tricks."
          verified: false
          source: "protondb.com/app/2358720 (retrieved 2026-07-15)"

      - symptom: "UE5 traversal stutter and VRAM exhaustion / texture pop-in on 8GB cards"
        cause: "Unreal Engine 5 shader-comp and streaming stutter; at higher presets the game exceeds 8GB VRAM. Enabling NVAPI lets DLSS run under Proton, cutting VRAM pressure; GameMode pins the performance profile."
        when: { gpu: nvidia }
        fix:
          type: launch_option
          value: "PROTON_ENABLE_NVAPI=1 gamemoderun %command%"
          verified: false
          source: "protondb.com/app/2358720 (retrieved 2026-07-15)"


  - name: "Monster Hunter Wilds"
    steam_id: 2246340
    aliases: ["mh wilds", "monster hunter wilds"]
    issues:
      - symptom: "Game fails to launch / crashes on startup after a Capcom title update on Linux & Steam Deck"
        cause: "A game update broke compatibility with stable Proton; Valve shipped a Proton Hotfix / newer Proton to work around it."
        fix:
          type: info
          value: "Set the title to Proton Hotfix (or Proton Experimental / GE-Proton latest) in Properties -> Compatibility. Note: Denuvo counts each Proton version change or launch-option edit as a new machine activation (limit ~5 per 24h), so settle on one Proton build before playing."
          verified: false
          source: "gamingonlinux.com/2025/04/proton-hotfix-updated-to-fix-monster-hunter-wilds (retrieved 2026-07-15)"

      - symptom: "Heavy VRAM/shader-streaming stutter and frame-time spikes on 8GB GPUs (RE Engine texture streaming)"
        cause: "RE Engine streams textures via GPU decompression; on 8GB cards this overruns VRAM and causes hitching, and host-visible VRAM uploads add stalls on NVIDIA. Disabling HVV uploads removes the stalls."
        when: { gpu: nvidia }
        fix:
          type: launch_option
          value: "VKD3D_CONFIG=no_upload_hvv %command%"
          verified: false
          source: "nerdburglars.net/gameguides/monster-hunter-wilds-shader-recompilation-linux (retrieved 2026-07-15)"

      - symptom: "Out-of-VRAM crashes or persistent texture stutter on 8GB cards even after tweaks"
        cause: "Default/High texture pool exceeds an 8GB budget; the biggest single lever is in-game texture quality, not a launch flag."
        fix:
          type: info
          value: "In-game set Texture Quality to Medium (or lower) and cap the texture memory setting to your VRAM; let shaders finish compiling at camp before moving. This is the primary fix for 8GB GPUs."
          verified: false
          source: "tier1settings.com/monster-hunter-wilds-stuttering-fix (retrieved 2026-07-15)"


  - name: "Destiny 2"
    steam_id: 1085660
    aliases: ["destiny 2", "d2"]
    issues:
