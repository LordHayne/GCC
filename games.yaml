          value: "Set compatibility to Proton Experimental (Properties -> Compatibility). Combine with the opengl3 launch option above if you still get a black screen. If native runs fine for you, leave it native - no perf flags needed."
          verified: false
          source: "protondb.com/app/2868840 (retrieved 2026-07-15)"


