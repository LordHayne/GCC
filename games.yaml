  - name: "ELDEN RING NIGHTREIGN"
    steam_id: 2622380
    aliases: ["nightreign", "elden ring nightreign"]
    issues:
      - symptom: "Game never reaches the start screen on older Proton (black screen / crash on launch), even though Easy Anti-Cheat itself is compatible"
        cause: "NIGHTREIGN's kernel-level Easy Anti-Cheat is whitelisted for Linux and works, but the game only initializes on recent Proton. Older stable branches fail to reach the title screen."
        fix:
          type: info
          value: "Set the Proton version to Proton 9.0-4 or newer (Experimental / GE also work). Properties -> Compatibility -> force a specific Steam Play tool. Do NOT disable EAC - anti-cheat is supported and required for co-op."
          verified: false
          source: "areweanticheatyet.com/game/elden-ring-nightreign (retrieved 2026-07-15)"

      - symptom: "Long freezes / stutter (several seconds) during gameplay that don't happen on Windows, which can drop framerate low enough to disconnect from seamless co-op"
        cause: "FromSoftware DX12 engine shader-compilation and VKD3D heap behaviour cause traversal/shader stutter; on NVIDIA the default present path adds further hitching."
        when: { gpu: nvidia }
        fix:
          type: launch_option
          value: "VKD3D_CONFIG=descriptor_heap PROTON_VKD3D_HEAP=1 gamemoderun %command%"
          verified: false
          source: "github.com/ValveSoftware/Proton/issues/8751 (retrieved 2026-07-15)"


  - name: "Street Fighter 6"
