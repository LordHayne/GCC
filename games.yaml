  - name: "Hearts of Iron IV"
    steam_id: 394360
    aliases: ["hoi4", "hearts of iron 4"]
    issues:
      - symptom: "Unsure whether to use the native Linux build or Proton"
        cause: "Hearts of Iron IV ships a native Linux (OpenGL) build with no anti-cheat, so it starts out of the box. The native build is reliable but historically runs a bit below the Windows/Proton renderer; if native stutters or the Paradox launcher misbehaves, forcing Proton is the standard, better-performing alternative."
        fix:
