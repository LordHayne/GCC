      - symptom: "Missing DLSS / NVIDIA features and rougher frametimes than expected on NVIDIA GPUs"
        cause: "Proton does not expose the NVIDIA NVAPI layer by default, so the game cannot use NVIDIA-specific paths."
        when: { gpu: nvidia }
        fix:
